# ==========================================
# Barber Application - Development (H2)
# ==========================================

spring.application.name=Barber

# H2 Database Configuration (Development)
spring.datasource.url=jdbc:h2:file:./test;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
barber.app.jwtSecret=myVerySecretKeyForBarberAppThatIsAtLeast32CharactersLong
barber.app.jwtExpirationMs=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.example.barber=DEBUG

# Development Mode
spring.profiles.active=default

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

