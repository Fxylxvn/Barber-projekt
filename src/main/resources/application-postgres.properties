# ==========================================
# Barber Application - Local PostgreSQL
# ==========================================

spring.application.name=Barber

# PostgreSQL Database Configuration (Local)
spring.datasource.url=jdbc:postgresql://localhost:5432/barberdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=barber_user
spring.datasource.password=barber_password
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
barber.app.jwtSecret=myVerySecretKeyForBarberAppThatIsAtLeast32CharactersLong
barber.app.jwtExpirationMs=86400000

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Logging
logging.level.root=INFO
logging.level.com.example.barber=DEBUG

