<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${barber.name} + ' - GENTLEMAN\'S BARBER CLUB'"></title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <style>
        .full-profile-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px 60px 20px;
        }
        .header-branding {
            text-align: center;
            margin-bottom: 50px;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 40px;
            align-items: start;
        }
        .profile-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 40px 30px;
            box-shadow: 0 15px 45px -10px rgba(0, 0, 0, 0.7);
            text-align: center;
        }
        .profile-card img.barber-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            box-shadow: 0 0 20px var(--gold-glow-strong);
            margin-bottom: 24px;
        }
        .profile-card .name {
            font-family: var(--font-serif);
            font-size: 32px;
            color: var(--text-light);
            margin-bottom: 6px;
        }
        .profile-card .title {
            font-size: 13px;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .rating-badge {
            font-size: 15px;
            color: #ffb800;
            background: rgba(255, 184, 0, 0.06);
            padding: 8px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 184, 0, 0.15);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 30px;
        }
        .schedule-box {
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
            text-align: left;
        }
        .schedule-box h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--gold);
            margin-bottom: 16px;
            font-weight: 700;
        }
        .schedule-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .schedule-label {
            color: var(--text-muted);
        }
        .schedule-value {
            color: var(--text-light);
            font-weight: 500;
        }
        
        .main-details {
            display: flex;
            flex-direction: column;
            gap: 32px;
        }
        
        .details-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 40px;
            box-shadow: 0 15px 45px -10px rgba(0, 0, 0, 0.7);
        }
        
        .section-headline {
            font-family: var(--font-serif);
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .bio-text {
            color: var(--text-light);
            font-size: 16px;
            line-height: 1.8;
        }
        
        .certificate-showcase {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .certificate-frame {
            border: 12px solid #1e1b15;
            outline: 1px solid var(--border-color);
            background: #fff;
            padding: 24px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.9), 0 0 40px var(--gold-glow);
            max-width: 500px;
            width: 100%;
            border-radius: 4px;
            transition: transform 0.3s ease;
        }
        .certificate-frame:hover {
            transform: scale(1.02);
        }
        .certificate-frame img {
            width: 100%;
            height: auto;
            display: block;
            border: 1px solid #d4af37;
        }
        
        .certificate-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.7;
            text-align: center;
            max-width: 600px;
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        
        .gallery-hover-item {
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        
        .gallery-hover-item:hover {
            transform: scale(1.04);
            border-color: var(--gold) !important;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        @media (max-width: 992px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="full-profile-container">
        <!-- Logo Header -->
        <header class="header-branding">
            <h1 class="logo-title" style="font-size: 36px; color:#fff;">GENTLEMAN'S</h1>
            <h2 class="logo-subtitle" style="font-size: 15px; color:var(--gold); letter-spacing: 10px; margin-top: 4px;">BARBER CLUB</h2>
        </header>

        <div class="profile-grid">
            <!-- Left Side: Barber Personal Info -->
            <aside class="profile-card">
                <img class="barber-photo" th:src="${barber.photoUrl != null ? barber.photoUrl : 'https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300'}" alt="Barber photo"/>
                <h2 class="name" th:text="${barber.name}"></h2>
                <div class="title" th:text="${barber.title}"></div>
                
                <div class="rating-badge">
                    <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    <span th:text="${barber.rating != null ? barber.rating : '5.0'}"></span> / 5.0 (Ocena Klientów)
                </div>
                
                <div class="schedule-box">
                    <h3>Grafik Pracy</h3>
                    <div class="schedule-row">
                        <span class="schedule-label">Godziny pracy:</span>
                        <span class="schedule-value" th:text="${barber.workStartHour != null && barber.workEndHour != null} ? ${barber.workStartHour} + ':00 - ' + ${barber.workEndHour} + ':00' : 'Brak godzin'"></span >
                    </div>
                    <div class="schedule-row">
                        <span class="schedule-label">Dni pracy:</span>
                        <span class="schedule-value" th:text="${workDaysFormatted}"></span >
                    </div>
                </div>
            </aside>

            <!-- Right Side: Main Details and Certificate -->
            <main class="main-details">
                <!-- Bio Details -->
                <section class="details-section">
                    <h2 class="section-headline">
                        <span>💈</span> Profil Stylisty
                    </h2>
                    <p class="bio-text" th:text="${barber.bio != null ? barber.bio : 'Brak szczegółowego opisu o tym barberze.'}"></p>
                </section>

                <!-- Gallery Showcase -->
                <section class="details-section">
                    <h2 class="section-headline">
                        <span>📸</span> Galeria Prac
                    </h2>
                    <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:16px;">
                        <div th:each="img : ${barber.galleryImages}" style="border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-color); aspect-ratio:1;" class="gallery-hover-item">
                            <img th:src="${img}" style="width:100%; height:100%; object-fit:cover; display:block;" alt="Praca barbera"/>
                        </div>
                        <div th:if="${#lists.isEmpty(barber.galleryImages)}" style="grid-column:1/-1; text-align:center; padding:20px; color:var(--text-muted); font-size:14px;">
                            Brak zdjęć w galerii tego stylisty.
                        </div>
                    </div>
                </section>

                <!-- Certificate Details -->
                <section class="details-section">
                    <h2 class="section-headline">
                        <span>🏆</span> Zdobyty Certyfikat & Kwalifikacje
                    </h2>
                    <div class="certificate-showcase">
                        <h3 th:text="${cert.title}" style="font-family: var(--font-serif); font-size: 20px; color: var(--gold); text-align: center; margin-bottom: 10px;"></h3>
                        <div class="certificate-frame">
                            <img th:src="${cert.image}" alt="Certyfikat"/>
                        </div>
                        <p class="certificate-desc" th:text="${cert.description}"></p>
                    </div>
                </section>
                
                <!-- Navigation Actions -->
                <div style="display: flex; gap: 20px; margin-top: 10px;">
                    <a href="/login" class="premium-btn btn-secondary" style="text-decoration: none; flex: 1; text-align: center;">Powrót do logowania</a>
                    <a href="/login" class="premium-btn" style="text-decoration: none; flex: 1; text-align: center;">Zarezerwuj wizytę u tego barbera</a>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
