# ==========================================
# Docker Compose - Barber App + PostgreSQL
# ==========================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: barber-postgres
    environment:
      POSTGRES_DB: barberdb
      POSTGRES_USER: barber_user
      POSTGRES_PASSWORD: barber_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - barber-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U barber_user -d barberdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Barber Application
  barber-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barber-app
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/barberdb
      SPRING_DATASOURCE_USERNAME: barber_user
      SPRING_DATASOURCE_PASSWORD: barber_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - barber-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local

networks:
  barber-network:
    driver: bridge
